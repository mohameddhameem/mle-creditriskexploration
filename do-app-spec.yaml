# DigitalOcean App Platform Spec (do-app-spec.yaml)
# Optimized for ultra-low cost and low memory footprint (~$22/month)

name: creditrisk-app
region: nyc
services:
  # Component 1: The FastAPI serving API
  - name: creditrisk-api
    image:
      registry_type: GHCR
      registry: OWNER_PLACEHOLDER
      repository: REPO_PLACEHOLDER
      tag: latest
    # Debug-enhanced run command: prints full Python traceback if import fails
    run_command: python -c "import app" && uvicorn app:app --app-dir /opt/airflow --host 0.0.0.0 --port 8000
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xxs # 512 MB RAM, 1 vCPU ($5.00/mo)
    routes:
      - path: /
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${db.DATABASE_URL}

  # Component 2: The Airflow Webserver Dashboard
  - name: airflow-webserver
    image:
      registry_type: GHCR
      registry: OWNER_PLACEHOLDER
      repository: REPO_PLACEHOLDER
      tag: latest
    run_command: airflow webserver --port 8080
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs # 512 MB RAM, 1 vCPU ($5.00/mo)
    routes:
      - path: /airflow
    envs:
      - key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: AIRFLOW__CORE__FERNET_KEY
        scope: RUN_TIME
        value: PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - key: AIRFLOW__CORE__EXECUTOR
        scope: RUN_TIME
        value: LocalExecutor
      # Low-memory Webserver optimization
      - key: AIRFLOW__WEBSERVER__WORKERS
        scope: RUN_TIME
        value: "1" # Limit to 1 gunicorn worker to save ~200MB RAM
      # Subpath routing configuration
      - key: AIRFLOW__WEBSERVER__BASE_URL
        scope: RUN_TIME
        value: ${APP_URL}/airflow

workers:
  # Component 3: The Airflow Scheduler
  - name: airflow-scheduler
    image:
      registry_type: GHCR
      registry: OWNER_PLACEHOLDER
      repository: REPO_PLACEHOLDER
      tag: latest
    run_command: airflow scheduler
    instance_count: 1
    instance_size_slug: basic-xxs # 512 MB RAM, 1 vCPU ($5.00/mo)
    envs:
      - key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: AIRFLOW__CORE__FERNET_KEY
        scope: RUN_TIME
        value: PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - key: AIRFLOW__CORE__EXECUTOR
        scope: RUN_TIME
        value: LocalExecutor
      # Low-memory & CPU Scheduler optimization
      - key: AIRFLOW__SCHEDULER__PARSING_PROCESSES
        scope: RUN_TIME
        value: "1" # Limit to 1 parsing thread instead of default 2+ (saves ~150MB RAM)
      - key: AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL
        scope: RUN_TIME
        value: "30" # Parse files every 30 seconds instead of continuously, reducing CPU load

jobs:
  # Component 4: Pre-Deploy Database Migration (Runs airflow db migrate once before containers update)
  - name: airflow-init
    image:
      registry_type: GHCR
      registry: OWNER_PLACEHOLDER
      repository: REPO_PLACEHOLDER
      tag: latest
    run_command: airflow db migrate
    type: PRE_DEPLOY
    instance_count: 1
    instance_size_slug: basic-xxs
    envs:
      - key: AIRFLOW__DATABASE__SQL_ALCHEMY_CONN
        scope: RUN_TIME
        value: ${db.DATABASE_URL}
      - key: AIRFLOW__CORE__FERNET_KEY
        scope: RUN_TIME
        value: PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=

databases:
  # Managed PostgreSQL metadata database for Airflow and App storage
  - engine: PG
    name: db
    version: "15"
    size: db-s-dev-database # Cost-effective dev tier database ($7.00/mo)
