services:
  jupyter:
    build: .
    container_name: jupyter_lab
    ports:
      - "8888:8888"
    volumes:
      - .:/opt/airflow
    environment:
      - JUPYTER_ENABLE_LAB=yes
    command: [ "jupyter", "lab", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--notebook-dir=/opt/airflow", "--ServerApp.token=''", "--ServerApp.disable_check_xsrf=True" ]

  api:
    build: .
    container_name: credit_risk_api
    ports:
      - "8000:8000"
    volumes:
      - .:/opt/airflow
    command: [ "uvicorn", "app:app", "--host", "0.0.0.0", "--port", "8000", "--reload" ]

  airflow-init:
    build: .
    user: "root"
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./datamart:/opt/airflow/datamart
      - ./models:/opt/airflow/models
      - ./inference.py:/opt/airflow/inference.py
      - ./train.py:/opt/airflow/train.py
      - ./config.py:/opt/airflow/config.py
    entrypoint: >
      /bin/bash -c "mkdir -p /opt/airflow/datamart /opt/airflow/models &&
      chmod -R 777 /opt/airflow/datamart /opt/airflow/models &&
      su -s /bin/bash airflow -c 'airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true' &&
      echo '========================================================================' &&
      echo 'Airflow is initialized. Access the Web UI at http://localhost:8080' &&
      echo '========================================================================'"

  airflow-webserver:
    build: .
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./datamart:/opt/airflow/datamart
      - ./models:/opt/airflow/models
      - ./inference.py:/opt/airflow/inference.py
      - ./train.py:/opt/airflow/train.py
      - ./config.py:/opt/airflow/config.py
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: .
    depends_on:
      - airflow-init
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__FERNET_KEY=PAqBeGJLJTYFzVkOGHWIYXdLO7XdXz5yTdxAGJe9ezM=
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - PYTHONPATH=/opt/airflow
    volumes:
      - airflow_data:/opt/airflow
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
      - ./utils:/opt/airflow/utils
      - ./data:/opt/airflow/data
      - ./datamart:/opt/airflow/datamart
      - ./models:/opt/airflow/models
      - ./inference.py:/opt/airflow/inference.py
      - ./train.py:/opt/airflow/train.py
      - ./config.py:/opt/airflow/config.py
    command: scheduler

volumes:
  airflow_data:
